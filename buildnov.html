<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freelance Page</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  background:#f5f5f5;
}

/* HEADER */
header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:15px 20px;
  background:#fff;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.menu-icon{
  font-size:26px;
  cursor:pointer;
}

.title{
  font-size:28px;
  font-weight:bold;
}

.profile{
  width:35px;
  height:35px;
  border-radius:50%;
  background-image:url('c:\\Users\\HP NoteBook\\Downloads\\user3.png');
  background-size:cover;
  cursor:pointer;
}

/* HERO SECTION */
.hero{
  background-image: url('c:\\Users\\HP NoteBook\\Downloads\\build3.jpeg');
  height: 350px;
  background-size: cover;
  text-align:center;
  padding:60px 20px;
}

.hero h1{
  font-size:32px;
  margin-bottom:30px;
}

.search-box{
  display:flex;
  max-width:500px;
  margin:0 auto;
  background:#fff;
  border-radius:30px;
  overflow:hidden;
}

.search-box input{
  flex:1;
  padding:15px;
  border:none;
  outline:none;
  font-size:16px;
}

.search-box button{
  background:lightseagreen;
  border:none;
  color:#fff;
  padding:0 20px;
  cursor:pointer;
}

/* SERVICES GRID */
.services{
  padding:30px 20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:20px;
  text-align:center;
}

.service-card{
  background:#fff;
  padding:25px 15px;
  border-radius:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
  transition:0.3s;
}

.service-card:hover{
  transform:translateY(-5px);
}

.service-card img{
  width:40px;
  margin-bottom:15px;
}

/* POPULAR SERVICES */
.popular{
  padding:30px 20px;
}

.popular h2{
  font-size:28px;
  margin-bottom:20px;
}

.popular-container{
  display:flex;
  gap:20px;
  overflow-x:auto;
}

.popular-card{
  min-width:220px;
  background:lightseagreen;
  color:#fff;
  border-radius:15px;
  padding:20px;
}

.popular-card img{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

/* MOBILE MENU */
.side-menu{
  position:fixed;
  top:0;
  left:-250px;
  width:250px;
  height:100%;
  background:#fff;
  box-shadow:2px 0 10px rgba(0,0,0,0.2);
  padding:20px;
  transition:0.3s;
}

.side-menu.active{
  left:0;
}

.side-menu ul{
  list-style:none;
  margin-top:30px;
}

.side-menu ul li{
  margin:15px 0;
  font-size:18px;
}

.close-btn{
  font-size:22px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- SIDE MENU -->
<div class="side-menu" id="menu">
  <div class="close-btn" onclick="closeMenu()">✖</div>
  <ul>
    <li>Home</li>
    <li>Categories</li>
    <li>About</li>
    <li>Contact</li>
  </ul>
</div>

<!-- HEADER -->
<header>
  <div class="menu-icon" onclick="openMenu()">☰</div>
  <div class="title">Buildnov</div>
  <div class="profile"></div>
</header>

<!-- HERO -->
<section class="hero">
  <h1>Buildnov<br>Build your creative ideas</h1>
  
  <div class="search-box">
    <input type="text" placeholder='Try to build your ideas"'>
    <button>🔍</button>
  </div>
</section>

<!-- SERVICES -->
<section class="services">
  <div class="service-card">
    <img src="">
    <p>Programming & Tech</p>
  </div>

  <div class="service-card">
    <img src="">
    <p>Graphics & Design</p>
  </div>

  <div class="service-card">
    <img src="">
    <p>Digital Marketing</p>
  </div>

  <div class="service-card">
    <img src="">
    <p>Writing & Translation</p>
  </div>

  <div class="service-card">
    <img src="">
    <p>Video & Animation</p>
  </div>

  <div class="service-card">
    <img src="">
    <p>AI Services</p>
  </div>
</section>

<!-- POPULAR -->
<section class="popular">
  <h2>Popular services</h2>
  
  <div class="popular-container">
    <div class="popular-card">
      <h3>Vibe Coding</h3>
      <img src="">
    </div>

    <div class="popular-card">
      <h3>Website Development</h3>
      <img src="">
    </div>

    <div class="popular-card">
      <h3>App Development</h3>
      <img src="">
    </div>
  </div>
</section>

<script>
function openMenu(){
  document.getElementById("menu").classList.add("active");
}

function closeMenu(){
  document.getElementById("menu").classList.remove("active");
}
</script>

</body>
</html>
